############################################################
# experiment_grid.yml
# Grid config for binary and categorical MMIL / MCEM ablation experiments.
#
# Feature methods:
#   PCA = original baseline feature representation
#   ICA = independent component representation
#   NMF = non-negative matrix factorization representation
#
# Model backends:
#   glmnet ridge / elastic net / lasso
#   XGBoost
#
# Tasks:
#   binary:
#     Early vs Advanced
#
#   categorical three_stage:
#     I / II_III / IV
#
#   categorical four_stage:
#     I / II / III / IV
############################################################

project:
  proj_dir: "D:/Monte/Monte-Carlo-Method-Project-Group-4"
  in_dir: "D:/Monte/Monte-Carlo-Method-Project-Group-4/Abalation/Input"
  out_dir: "D:/Monte/Monte-Carlo-Method-Project-Group-4/Abalation/Output"

  expr_file: "GSE131907_pilot_expression_subset_dt.rds"
  meta_file: "GSE131907_pilot_sampled_cell_metadata_with_clinical.csv"

############################################################
# Defaults shared by all experiments
############################################################

defaults:
  test_fraction: 0.25

  min_cell_fraction: 0.01
  n_hvg: 2000
  scale_factor: 10000

  nmf_method: "brunet"
  nmf_nrun: 1

  ##########################################################
  # Binary MMIL parameter
  #
  # rho:
  #   Assumed baseline-like fraction among Advanced cells.
  #   If rho = 0.70, the expected advanced-associated fraction
  #   among Advanced cells is 1 - rho = 0.30.
  ##########################################################

  rho: 0.70

  ##########################################################
  # Categorical MMIL parameter
  #
  # label_strength:
  #   Prior probability assigned to the patient-level observed class.
  #
  # Example for three_stage I / II_III / IV:
  #   If a patient is Stage IV and label_strength = 0.70,
  #   initial cell-level prior is:
  #     I      = 0.15
  #     II_III = 0.15
  #     IV     = 0.70
  ##########################################################

  label_strength: 0.70

  max_iter: 30
  tol: 0.0001
  mcem_samples: 30

  save_plots: true

############################################################
# Task grid
#
# For debugging, keep only one task.
# For full ablation, include binary and categorical.
############################################################

tasks:
  - task_type: "binary"

  - task_type: "categorical"
    categorical_scheme: "three_stage"

  # Uncomment if you want four-stage categorical ablation.
  # - task_type: "categorical"
  #   categorical_scheme: "four_stage"

############################################################
# Feature extraction grid
#
# Start with PCA 20 first if you only want to debug.
# Then expand to all methods and dimensions.
############################################################

features:
  methods:
    - PCA
    - ICA
    - NMF

  n_components:
    - 10
    - 20
    - 50

############################################################
# Model backend grid
#
# glmnet_alpha:
#   0   = ridge logistic / multinomial regression
#   0.5 = elastic net logistic / multinomial regression
#   1   = lasso logistic / multinomial regression
#
# XGBoost uses weighted pseudo-observations for soft labels.
############################################################

models:
  - model_name: "glmnet_ridge"
    backend: "glmnet"
    glmnet_alpha: 0
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "glmnet_elasticnet"
    backend: "glmnet"
    glmnet_alpha: 0.5
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "glmnet_lasso"
    backend: "glmnet"
    glmnet_alpha: 1
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "xgboost"
    backend: "xgboost"
    eta: 0.05
    max_depth: 3
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    xgb_lambda: 1
    xgb_alpha: 0
    nrounds: 100
    nthread: 2
    verbose: 0

############################################################
# Random seeds
#
# Start with one seed for debugging.
# Later you can add more seeds for repeated split experiments.
############################################################

seeds:
  - 2026